<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit | Profile</title>
  </head>
  <body class="min-h-screen">
    <header class="p-6">
      <div>
        <a href="../feed/index.html">
          <img
            src="../src/assets/graphic/orbit-logo.svg"
            alt="Orbit logo"
            class="h-7 w-auto"
          />
        </a>
      </div>
    </header>
    <main
      class="mx-auto flex max-w-md flex-col gap-4 px-6 py-8 md:max-w-2xl md:gap-6 md:px-8"
    >
      <section class="flex flex-col gap-5">
        <!-- user -->
        <div
          class="flex flex-col items-center gap-3 text-center sm:flex-row sm:text-left"
        >
          <div
            class="h-20 w-20 shrink-0 overflow-hidden rounded-full md:h-24 md:w-24"
          >
            <img
              class="block h-full w-full object-cover"
              src="../src/assets/image/profile/heyitsava-profile.webp"
              alt=""
            />
          </div>

          <div>
            <p class="text-xl font-bold">heyitsava</p>
            <p class="text-balance">
              Student. Coffee lover. Pet parent. Usually outside or looking for
              snacks.
            </p>
          </div>
        </div>

        <!-- stats -->
        <div class="flex text-center">
          <div class="flex-1">
            <p class="text-lg font-bold sm:text-xl">386</p>
            <p class="text-sm text-neutral-500 sm:text-base">Posts</p>
          </div>

          <div class="flex-1 border-x border-gray-200">
            <p class="text-lg font-bold sm:text-xl">1186</p>
            <p class="text-sm text-neutral-500 sm:text-base">Followers</p>
          </div>

          <div class="flex-1">
            <p class="text-lg font-bold sm:text-xl">386</p>
            <p class="text-sm text-neutral-500 sm:text-base">Following</p>
          </div>
        </div>

        <!-- actions -->
        <div class="flex gap-3">
          <button
            type="button"
            class="h-11 flex-1 rounded-full bg-black px-6 font-bold text-white transition-colors duration-200 hover:bg-orange-500 md:h-12"
          >
            Follow
          </button>

          <button
            type="button"
            aria-label="Send message"
            class="flex h-11 w-20 shrink-0 items-center justify-center rounded-full border border-gray-300 md:h-12 md:w-24"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.8"
              stroke="currentColor"
              class="h-6 w-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
              />
            </svg>
          </button>
        </div>
      </section>

      <!-- grid -->
      <section class="mt-6 grid grid-cols-3 gap-0.5">
        <img
          class="aspect-[5/7] w-full object-cover"
          src="../src/assets/image/content/red-kayak-mountain-lake.webp"
          alt="Red kayak on a lake facing a mountain range"
        />

        <img
          class="aspect-[5/7] w-full object-cover"
          src="../src/assets/image/content/friends-sharing-pizza.webp"
          alt="Two people reaching for slices of pizza while sharing a meal."
        />
        <img
          class="aspect-[5/7] w-full object-cover"
          src="../src/assets/image/content/greenhouse-plants-and-white-flower.webp"
          alt="Lush green plants and a white flower inside a sunlit greenhouse."
        />

        <img
          class="aspect-[5/7] w-full object-cover"
          src="../src/assets/image/content/person-viewing-fish-at-aquarium.webp"
          alt="Person standing in front of a large aquarium tank filled with fish."
        />
        <img
          class="aspect-[5/7] w-full object-cover"
          src="../src/assets/image/content/outdoor-dining-table-with-string-lights.webp"
          alt="Outdoor dining table set for a meal in a garden with string lights hanging overhead."
        />
        <img
          class="aspect-[5/7] w-full object-cover"
          src="../src/assets/image/content/person-and-dog-in-raincoats.webp"
          alt="Person and dog wearing raincoats standing on a rain-soaked sidewalk."
        />
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
