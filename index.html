<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit | Login</title>
  </head>
  <body class="min-h-screen">
    <header class="p-6">
      <div>
        <img
          src="./src/assets/graphic/orbit-logo.svg"
          alt="Orbit logo"
          class="h-7 w-auto"
        />
      </div>
    </header>
    <main class="mx-auto max-w-md px-6 py-8">
      <section class="mt-10 flex flex-col items-center gap-10">
        <div class="text-center">
          <h1 class="text-[32px] font-bold">Hello there!</h1>
          <p class="text-balance text-neutral-500">
            Connect, share, and discover moments from people around the world.
          </p>
        </div>

        <div class="transition-transform duration-600 hover:-rotate-4">
          <img
            src="./src/assets/graphic/rocket-to-the-moon.svg"
            alt="Rocket flying toward the moon"
          />
        </div>
        <form
          action="./profile/"
          class="mx-auto flex w-full max-w-md flex-col gap-4"
        >
          <h2 class="text-[32px] font-bold">Login</h2>
          <!-- Username -->
          <label for="username" class="hidden">Username</label>

          <div
            class="flex h-11 items-center gap-3 rounded-full border border-gray-300 px-5"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="size-5 text-gray-500"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
              />
            </svg>

            <input
              id="username"
              type="text"
              placeholder="Username"
              class="w-full flex-1 bg-transparent outline-none"
              required
            />
          </div>

          <!-- Password -->
          <label for="password" class="hidden">Password</label>

          <div
            class="flex h-11 items-center gap-3 rounded-full border border-gray-300 px-5"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="size-5 text-gray-500"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
              />
            </svg>

            <input
              id="password"
              type="password"
              minlength="8"
              placeholder="Password"
              class="w-full flex-1 bg-transparent outline-none"
              required
            />
          </div>

          <a
            href="#"
            class="text-center font-medium transition-colors duration-200 hover:text-orange-500 hover:underline"
            >Forgot password?</a
          >

          <button
            type="submit"
            class="h-11 rounded-full bg-black text-white transition-colors duration-200 hover:bg-orange-500"
          >
            Login
          </button>

          <a href="#" class="text-center text-neutral-500"
            >Don't have an account?
            <span
              class="font-medium text-black transition-colors duration-200 hover:text-orange-500 hover:underline"
              >Sign up</span
            ></a
          >
        </form>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
